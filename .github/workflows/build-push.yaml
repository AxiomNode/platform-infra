name: Build & Push Docker Images

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ai-engine-api
          - ai-engine-stats
          - microservice-quizz
          - microservice-wordpass
          - microservice-users
          - api-gateway
          - bff-mobile
          - bff-backoffice
          - backoffice
      source_ref:
        description: "Optional source repository ref/SHA to build when dispatching cross-repo"
        required: false
        default: ""
        type: string
      publish_prod_tag:
        description: "Also publish mutable :prod tag (manual promotion only)"
        required: true
        default: false
        type: boolean

# Workflow-level permissions: this is the central image build, so the GITHUB_TOKEN
# only needs read access to source repos and write access to GHCR packages. No
# other scopes are required (no deployments, no actions:write, no id-token).
# Cross-repo source checkouts use `secrets.CROSS_REPO_READ_TOKEN` (fine-grained
# PAT scoped to `contents:read` on the AxiomNode org) instead of the workflow
# token.
permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  REGISTRY_ORG: axiomnode

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: changes
        name: Detect changed services
        run: |
          ALL_SERVICES='["ai-engine-api","ai-engine-stats","microservice-quizz","microservice-wordpass","microservice-users","api-gateway","bff-mobile","bff-backoffice","backoffice"]'

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.service }}" == "all" ]]; then
            echo "services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.service }}" != "all" ]]; then
            echo "services=[\"${{ inputs.service }}\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVICES=()
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          if [[ -n "${BASE_SHA}" && "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            CHANGED=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          declare -A SERVICE_MAP=(
            ["ai-engine/"]="ai-engine-api ai-engine-stats"
            ["microservice-quizz/"]="microservice-quizz"
            ["microservice-wordpass/"]="microservice-wordpass"
            ["microservice-users/"]="microservice-users"
            ["api-gateway/"]="api-gateway"
            ["bff-mobile/"]="bff-mobile"
            ["bff-backoffice/"]="bff-backoffice"
            ["backoffice/"]="backoffice"
          )

          for path in "${!SERVICE_MAP[@]}"; do
            if echo "$CHANGED" | grep -q "^${path}"; then
              for svc in ${SERVICE_MAP[$path]}; do
                SERVICES+=("\"${svc}\"")
              done
            fi
          done

          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
          else
            UNIQUE=$(echo "${SERVICES[@]}" | tr ' ' '\n' | sort -u | tr '\n' ',')
            echo "services=[${UNIQUE%,}]" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    environment: build
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate cross-repo token
        run: |
          if [[ -z "${{ secrets.CROSS_REPO_READ_TOKEN }}" ]]; then
            echo "CROSS_REPO_READ_TOKEN is required to checkout service repositories (AxiomNode/*)."
            echo "Create it in platform-infra > Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Validate token access to source repository
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail

          SERVICE="${{ matrix.service }}"
          SOURCE_REPO="${SERVICE}"
          if [[ "${SERVICE}" == "ai-engine-api" || "${SERVICE}" == "ai-engine-stats" ]]; then
            SOURCE_REPO="ai-engine"
          elif [[ "${SERVICE}" == "microservice-wordpass" ]]; then
            SOURCE_REPO="microservice-word-pass"
          fi

          TARGET_REPO="AxiomNode/${SOURCE_REPO}"

          STATUS_CODE=$(curl -sS -o /tmp/repo_access.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${TARGET_REPO}")

          if [[ "${STATUS_CODE}" != "200" ]]; then
            echo "::error::CROSS_REPO_READ_TOKEN cannot access ${TARGET_REPO} (HTTP ${STATUS_CODE})."
            echo "If using a Fine-grained PAT, include this repository and grant Contents: Read."
            cat /tmp/repo_access.json
            exit 1
          fi

      - name: Validate token access to dependency repositories
        if: contains(fromJson('["microservice-quizz","microservice-wordpass","microservice-users","api-gateway","bff-mobile","bff-backoffice"]'), matrix.service)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail

          for DEP_REPO in "AxiomNode/shared-sdk-client" "AxiomNode/contracts-and-schemas"; do
            STATUS_CODE=$(curl -sS -o /tmp/repo_access_dep.json -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${DEP_REPO}")

            if [[ "${STATUS_CODE}" != "200" ]]; then
              echo "::error::CROSS_REPO_READ_TOKEN cannot access ${DEP_REPO} (HTTP ${STATUS_CODE})."
              echo "Include dependency repositories and grant Contents: Read."
              cat /tmp/repo_access_dep.json
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          TAG="${GITHUB_SHA::8}"
          BRANCH="${GITHUB_REF_NAME}"

          declare -A REPO_MAP=(
            ["ai-engine-api"]="ai-engine"
            ["ai-engine-stats"]="ai-engine"
            ["microservice-quizz"]="microservice-quizz"
            ["microservice-wordpass"]="microservice-word-pass"
            ["microservice-users"]="microservice-users"
            ["api-gateway"]="api-gateway"
            ["bff-mobile"]="bff-mobile"
            ["bff-backoffice"]="bff-backoffice"
            ["backoffice"]="backoffice"
          )

          declare -A IMAGE_NAME_MAP=(
            ["ai-engine-api"]="ai-engine-api"
            ["ai-engine-stats"]="ai-engine-stats"
            ["microservice-quizz"]="microservice-quizz-api"
            ["microservice-wordpass"]="microservice-wordpass-api"
            ["microservice-users"]="microservice-users-api"
            ["api-gateway"]="api-gateway"
            ["bff-mobile"]="bff-mobile"
            ["bff-backoffice"]="bff-backoffice"
            ["backoffice"]="backoffice"
          )

          IMAGE_NAME="${IMAGE_NAME_MAP[${{ matrix.service }}]}"
          REPO_NAME="${REPO_MAP[${{ matrix.service }}]}"

          declare -A CHECKOUT_PATH_MAP=(
            ["ai-engine-api"]="ai-engine"
            ["ai-engine-stats"]="ai-engine"
            ["microservice-quizz"]="microservice-quizz"
            ["microservice-wordpass"]="microservice-wordpass"
            ["microservice-users"]="microservice-users"
            ["api-gateway"]="api-gateway"
            ["bff-mobile"]="bff-mobile"
            ["bff-backoffice"]="bff-backoffice"
            ["backoffice"]="backoffice"
          )

          if [[ "$BRANCH" == "main" ]]; then
            TAGS="${REGISTRY}/${REGISTRY_ORG}/${IMAGE_NAME}:${TAG},${REGISTRY}/${REGISTRY_ORG}/${IMAGE_NAME}:stg,${REGISTRY}/${REGISTRY_ORG}/${IMAGE_NAME}:dev"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_prod_tag }}" == "true" ]]; then
              TAGS="${TAGS},${REGISTRY}/${REGISTRY_ORG}/${IMAGE_NAME}:prod"
            fi
          else
            TAGS="${REGISTRY}/${REGISTRY_ORG}/${IMAGE_NAME}:${TAG},${REGISTRY}/${REGISTRY_ORG}/${IMAGE_NAME}:dev"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO_NAME}" >> "$GITHUB_OUTPUT"
          echo "checkout_path=${CHECKOUT_PATH_MAP[${{ matrix.service }}]}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"

          # Determine build context and target
          declare -A CONTEXT_MAP=(
            ["ai-engine-api"]="source/ai-engine/src"
            ["ai-engine-stats"]="source/ai-engine/src"
            ["microservice-quizz"]="source"
            ["microservice-wordpass"]="source"
            ["microservice-users"]="source"
            ["api-gateway"]="source"
            ["bff-mobile"]="source"
            ["bff-backoffice"]="source"
            ["backoffice"]="source"
          )

          declare -A DOCKERFILE_MAP=(
            ["ai-engine-api"]="source/ai-engine/src/Dockerfile"
            ["ai-engine-stats"]="source/ai-engine/src/Dockerfile"
            ["microservice-quizz"]="source/microservice-quizz/src/Dockerfile"
            ["microservice-wordpass"]="source/microservice-wordpass/src/Dockerfile"
            ["microservice-users"]="source/microservice-users/src/Dockerfile"
            ["api-gateway"]="source/api-gateway/src/Dockerfile.edge"
            ["bff-mobile"]="source/bff-mobile/src/Dockerfile.edge"
            ["bff-backoffice"]="source/bff-backoffice/src/Dockerfile.edge"
            ["backoffice"]="source/backoffice/Dockerfile"
          )

          declare -A TARGET_MAP=(
            ["ai-engine-api"]="runtime-api"
            ["ai-engine-stats"]="runtime-stats"
          )

          echo "context=${CONTEXT_MAP[${{ matrix.service }}]}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE_MAP[${{ matrix.service }}]}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET_MAP[${{ matrix.service }}]:-}" >> "$GITHUB_OUTPUT"

      - name: Checkout service source repository
        uses: actions/checkout@v5
        with:
          repository: AxiomNode/${{ steps.meta.outputs.repo }}
          ref: ${{ steps.meta.outputs.source_ref }}
          path: source/${{ steps.meta.outputs.checkout_path }}
          fetch-depth: 20
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Generate backoffice deployment history
        if: matrix.service == 'backoffice'
        working-directory: source/backoffice
        run: |
          set -euo pipefail

          node <<'EOF'
          const { execSync } = require('node:child_process');
          const { writeFileSync } = require('node:fs');
          const { join } = require('node:path');

          function formatUtc(date) {
            const pad = (value) => String(value).padStart(2, '0');
            return `${date.getUTCFullYear()}-${pad(date.getUTCMonth() + 1)}-${pad(date.getUTCDate())} ${pad(date.getUTCHours())}:${pad(date.getUTCMinutes())} UTC`;
          }

          const currentSha = execSync('git rev-parse HEAD', { encoding: 'utf8' }).trim();
          const currentVersion = execSync('git rev-parse --short=7 HEAD', { encoding: 'utf8' }).trim();
          const currentDeployedAt = formatUtc(new Date());
          const rawLog = execSync('git log -n 12 --date=iso-strict --pretty=format:%H%x1f%h%x1f%cI%x1f%s', {
            encoding: 'utf8',
          }).trim();

          const history = rawLog.length === 0
            ? []
            : rawLog.split('\n').map((line, index) => {
                const [commitSha, version, committedAt, summary] = line.split('\x1f');
                return {
                  version,
                  deployedAt: index === 0 ? currentDeployedAt : formatUtc(new Date(committedAt)),
                  commitSha,
                  summary,
                };
              });

          const payload = {
            environment: 'stg',
            currentVersion,
            currentDeployedAt,
            history,
          };

          writeFileSync(join('src', 'data', 'deployment-history.json'), `${JSON.stringify(payload, null, 2)}\n`);
          console.log(`Generated deployment-history.json for ${currentVersion} (${currentSha})`);
          EOF

      - name: Checkout shared-sdk-client
        if: contains(fromJson('["microservice-quizz","microservice-wordpass","microservice-users","api-gateway","bff-mobile","bff-backoffice"]'), matrix.service)
        uses: actions/checkout@v5
        with:
          repository: AxiomNode/shared-sdk-client
          path: source/shared-sdk-client
          fetch-depth: 1
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Checkout contracts-and-schemas
        if: contains(fromJson('["microservice-quizz","microservice-wordpass","microservice-users","api-gateway","bff-mobile","bff-backoffice"]'), matrix.service)
        uses: actions/checkout@v5
        with:
          repository: AxiomNode/contracts-and-schemas
          path: source/contracts-and-schemas
          fetch-depth: 1
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Build and push (with target)
        if: steps.meta.outputs.target != ''
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.meta.outputs.context }}
          file: ${{ steps.meta.outputs.dockerfile }}
          target: ${{ steps.meta.outputs.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (no target)
        if: steps.meta.outputs.target == ''
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.meta.outputs.context }}
          file: ${{ steps.meta.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
