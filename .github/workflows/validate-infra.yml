name: Validate Infra

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

# Workflow-level permissions are intentionally minimal because this workflow
# only validates tracked infrastructure manifests and does not deploy anything.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify infra folders
        run: |
          test -d terraform
          test -d kubernetes/base
          test -d environments/dev
          test -d environments/stg
          test -d environments/prod
      - name: Enforce immutable Kubernetes image tags
        run: |
          set -euo pipefail
          bad_refs=$(grep -RnoE 'image:\s*[^ ]+:latest\b' kubernetes || true)
          if [[ -n "${bad_refs}" ]]; then
            echo "Found forbidden Kubernetes image tags using :latest"
            echo "${bad_refs}"
            exit 1
          fi
      - name: Render Kubernetes overlays with kustomize
        run: |
          set -euo pipefail
          kubectl kustomize kubernetes/overlays/dev > /tmp/dev-rendered.yaml
          kubectl kustomize kubernetes/overlays/stg > /tmp/stg-rendered.yaml
          kubectl kustomize kubernetes/overlays/stg-with-ai-engine > /tmp/stg-with-ai-engine-rendered.yaml
          kubectl kustomize kubernetes/overlays/prod > /tmp/prod-rendered.yaml
