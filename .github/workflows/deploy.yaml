name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - stg
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'stg' || 'dev') }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'stg' || 'dev') }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=stg" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate manifests
        run: |
          # Install kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

          ENV="${{ steps.env.outputs.env }}"
          echo "Validating overlay: ${ENV}"
          kustomize build "kubernetes/overlays/${ENV}" > /dev/null
          echo "Manifests valid."

      - name: Deploy to k3s (dev/stg)
        if: steps.env.outputs.env != 'prod'
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          K3S_HOST: ${{ secrets.K3S_HOST }}
          K3S_SSH_KEY: ${{ secrets.K3S_SSH_KEY }}
          K3S_USER: ${{ secrets.K3S_USER }}
        run: |
          ENV="${{ steps.env.outputs.env }}"
          NAMESPACE="axiomnode-${ENV}"
          REMOTE_DIR="/home/${K3S_USER}/axiomnode"

          if [[ -z "${GHCR_PULL_USERNAME}" || -z "${GHCR_PULL_TOKEN}" ]]; then
            echo "GHCR_PULL_USERNAME and GHCR_PULL_TOKEN are required for private GHCR pulls."
            exit 1
          fi

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$K3S_SSH_KEY" > ~/.ssh/k3s_key
          chmod 600 ~/.ssh/k3s_key
          ssh-keyscan -H "$K3S_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Ensure remote workspace exists in user-owned path.
          ssh -i ~/.ssh/k3s_key "${K3S_USER}@${K3S_HOST}" "mkdir -p '${REMOTE_DIR}'"

          # Copy manifests and apply
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/k3s_key" \
            kubernetes/ \
            "${K3S_USER}@${K3S_HOST}:${REMOTE_DIR}/kubernetes/"

          # Ensure namespace has pull credentials for private GHCR images.
          ssh -i ~/.ssh/k3s_key "${K3S_USER}@${K3S_HOST}" \
            "k3s kubectl create namespace '${NAMESPACE}' --dry-run=client -o yaml | k3s kubectl apply -f - && \
             k3s kubectl -n '${NAMESPACE}' create secret docker-registry ghcr-pull \
               --docker-server=ghcr.io \
               --docker-username='${GHCR_PULL_USERNAME}' \
               --docker-password='${GHCR_PULL_TOKEN}' \
               --dry-run=client -o yaml | k3s kubectl apply -f - && \
             k3s kubectl patch serviceaccount default -n '${NAMESPACE}' --type=merge -p '{\"imagePullSecrets\":[{\"name\":\"ghcr-pull\"}]}'"

          ssh -i ~/.ssh/k3s_key "${K3S_USER}@${K3S_HOST}" \
            "cd '${REMOTE_DIR}' && k3s kubectl apply -k kubernetes/overlays/${ENV}/"

          # Wait for rollouts
          ssh -i ~/.ssh/k3s_key "${K3S_USER}@${K3S_HOST}" \
            "NAMESPACE=axiomnode-${ENV} && \
             for deploy in \$(k3s kubectl get deployments -n \$NAMESPACE -o jsonpath='{.items[*].metadata.name}'); do \
               echo \"Waiting for \$deploy...\" && \
               k3s kubectl rollout status deployment/\$deploy -n \$NAMESPACE --timeout=300s || true; \
             done"

      - name: Deploy to cloud (prod)
        if: steps.env.outputs.env == 'prod'
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          KUBECONFIG_DATA: ${{ secrets.PROD_KUBECONFIG }}
        run: |
          if [[ -z "${GHCR_PULL_USERNAME}" || -z "${GHCR_PULL_TOKEN}" ]]; then
            echo "GHCR_PULL_USERNAME and GHCR_PULL_TOKEN are required for private GHCR pulls."
            exit 1
          fi

          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config

          NAMESPACE="axiomnode-prod"

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n "$NAMESPACE" --type=merge -p '{"imagePullSecrets":[{"name":"ghcr-pull"}]}'

          kubectl apply -k kubernetes/overlays/prod/

          for deploy in $(kubectl get deployments -n "$NAMESPACE" -o jsonpath='{.items[*].metadata.name}'); do
            echo "Waiting for ${deploy}..."
            kubectl rollout status deployment/"$deploy" -n "$NAMESPACE" --timeout=300s || true
          done

      - name: Smoke test
        run: |
          ENV="${{ steps.env.outputs.env }}"
          echo "Deployment to ${ENV} completed."
          echo "Run smoke tests manually or via the existing smoke-edge.sh script."
