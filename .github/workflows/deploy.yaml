name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stg
          - prod
      service:
        description: "Service to deploy (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - microservice-quizz
          - microservice-wordpass
          - microservice-users
          - api-gateway
          - bff-mobile
          - bff-backoffice
          - backoffice

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'stg' }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'stg' }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=stg" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine target deployments
        id: targets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          map_service_to_deployment() {
            case "$1" in
              microservice-quizz) echo "microservice-quizz-api" ;;
              microservice-wordpass) echo "microservice-wordpass-api" ;;
              microservice-users) echo "microservice-users-api" ;;
              api-gateway) echo "api-gateway" ;;
              bff-mobile) echo "bff-mobile" ;;
              bff-backoffice) echo "bff-backoffice" ;;
              backoffice) echo "backoffice" ;;
              *) return 1 ;;
            esac
          }

          map_service_to_image() {
            case "$1" in
              microservice-quizz) echo "ghcr.io/axiomnode/microservice-quizz-api" ;;
              microservice-wordpass) echo "ghcr.io/axiomnode/microservice-wordpass-api" ;;
              microservice-users) echo "ghcr.io/axiomnode/microservice-users-api" ;;
              api-gateway) echo "ghcr.io/axiomnode/api-gateway" ;;
              bff-mobile) echo "ghcr.io/axiomnode/bff-mobile" ;;
              bff-backoffice) echo "ghcr.io/axiomnode/bff-backoffice" ;;
              backoffice) echo "ghcr.io/axiomnode/backoffice" ;;
              *) return 1 ;;
            esac
          }

          ALL_DEPLOYMENTS="api-gateway backoffice bff-backoffice bff-mobile microservice-quizz-api microservice-users-api microservice-wordpass-api"
          image_overrides=""
          restart_after_apply="true"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            service_input="${{ inputs.service }}"
            if [[ "${service_input}" == "all" ]]; then
              deployments="${ALL_DEPLOYMENTS}"
            else
              deployments="$(map_service_to_deployment "${service_input}")"
            fi
          else
            run_id="${{ github.event.workflow_run.id }}"
            jobs_json=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${run_id}/jobs?per_page=100")

            services=$(jq -r '.jobs[] | select(.conclusion == "success") | .name' <<<"${jobs_json}" \
              | sed -n 's/^build-push (\(.*\))$/\1/p' \
              | sort -u)

            if [[ -z "${services}" ]]; then
              echo "deployments=" >> "$GITHUB_OUTPUT"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              echo "No successful build-push service jobs detected. Skipping deployment refresh."
              exit 0
            fi

            deployments=""
            while IFS= read -r service; do
              [[ -n "${service}" ]] || continue
              deploy_name=$(map_service_to_deployment "${service}" || true)
              [[ -n "${deploy_name}" ]] || continue
              if [[ " ${deployments} " != *" ${deploy_name} "* ]]; then
                deployments="${deployments} ${deploy_name}"
              fi
            done <<< "${services}"

            deployments=$(echo "${deployments}" | xargs)
            if [[ -z "${deployments}" ]]; then
              echo "deployments=" >> "$GITHUB_OUTPUT"
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              echo "No deployable services were found in the triggering build-push run. Skipping deployment refresh."
              exit 0
            fi

            image_tag="${{ github.event.workflow_run.head_sha }}"
            image_tag="${image_tag::8}"
            restart_after_apply="false"

            while IFS= read -r service; do
              [[ -n "${service}" ]] || continue
              image_name=$(map_service_to_image "${service}" || true)
              [[ -n "${image_name}" ]] || continue
              image_overrides+="${image_name}=${image_name}:${image_tag}"
              image_overrides+=$'\n'
            done <<< "${services}"
          fi

          echo "deployments=${deployments}" >> "$GITHUB_OUTPUT"
          echo "restart_after_apply=${restart_after_apply}" >> "$GITHUB_OUTPUT"
          echo "image_overrides<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s' "${image_overrides}" >> "$GITHUB_OUTPUT"
          echo >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "mode=apply" >> "$GITHUB_OUTPUT"
          echo "Target deployments: ${deployments}"
          if [[ -n "${image_overrides}" ]]; then
            echo "Using immutable image overrides from triggering build run:"
            printf '%s' "${image_overrides}"
          fi

      - name: Validate manifests
        if: steps.targets.outputs.mode == 'apply'
        run: |
          # Install kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

          ENV="${{ steps.env.outputs.env }}"
          echo "Validating overlay: ${ENV}"
          kustomize build "kubernetes/overlays/${ENV}" > /dev/null
          echo "Manifests valid."

      - name: Render deployment manifests
        id: render
        if: steps.targets.outputs.mode == 'apply'
        env:
          IMAGE_OVERRIDES: ${{ steps.targets.outputs.image_overrides }}
        run: |
          set -euo pipefail

          ENV="${{ steps.env.outputs.env }}"
          RENDER_DIR="$(mktemp -d)"
          cp -R kubernetes "${RENDER_DIR}/"

          if [[ -n "${IMAGE_OVERRIDES}" ]]; then
            pushd "${RENDER_DIR}/kubernetes/overlays/${ENV}" > /dev/null
            while IFS= read -r override; do
              [[ -n "${override}" ]] || continue
              kustomize edit set image "${override}"
            done <<< "${IMAGE_OVERRIDES}"
            popd > /dev/null
          fi

          rendered_manifest="${RENDER_DIR}/rendered-${ENV}.yaml"
          kustomize build "${RENDER_DIR}/kubernetes/overlays/${ENV}" > "${rendered_manifest}"

          echo "manifest=${rendered_manifest}" >> "$GITHUB_OUTPUT"
          echo "Rendered manifests ready at ${rendered_manifest}"

      - name: Deploy to k3s (stg/prod)
        if: steps.targets.outputs.mode == 'apply'
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          K3S_HOST: ${{ secrets.K3S_HOST }}
          K3S_SSH_KEY: ${{ secrets.K3S_SSH_KEY }}
          K3S_USER: ${{ secrets.K3S_USER }}
        run: |
          set -euo pipefail
          ENV="${{ steps.env.outputs.env }}"
          NAMESPACE="axiomnode-${ENV}"
          REMOTE_DIR="/home/${K3S_USER}/axiomnode"
          TARGET_DEPLOYS="${{ steps.targets.outputs.deployments }}"
          RENDERED_MANIFEST="${{ steps.render.outputs.manifest }}"
          RESTART_AFTER_APPLY="${{ steps.targets.outputs.restart_after_apply }}"

          if [[ -z "${GHCR_PULL_USERNAME}" || -z "${GHCR_PULL_TOKEN}" ]]; then
            echo "GHCR_PULL_USERNAME and GHCR_PULL_TOKEN are required for private GHCR pulls."
            exit 1
          fi

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$K3S_SSH_KEY" > ~/.ssh/k3s_key
          chmod 600 ~/.ssh/k3s_key
          ssh-keyscan -H "$K3S_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH_OPTS="-i ~/.ssh/k3s_key -o ServerAliveInterval=30 -o ServerAliveCountMax=20"

          # Ensure remote workspace exists in user-owned path.
          ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" "mkdir -p '${REMOTE_DIR}'"

          # Copy rendered manifests and apply the exact image versions selected for this run.
          rsync -avz \
            -e "ssh ${SSH_OPTS}" \
            "${RENDERED_MANIFEST}" \
            "${K3S_USER}@${K3S_HOST}:${REMOTE_DIR}/rendered-${ENV}.yaml"

          # Ensure namespace has pull credentials for private GHCR images.
          ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" \
            "k3s kubectl create namespace '${NAMESPACE}' --dry-run=client -o yaml | k3s kubectl apply -f - && \
             k3s kubectl -n '${NAMESPACE}' create secret docker-registry ghcr-pull \
               --docker-server=ghcr.io \
               --docker-username='${GHCR_PULL_USERNAME}' \
               --docker-password='${GHCR_PULL_TOKEN}' \
               --dry-run=client -o yaml | k3s kubectl apply -f - && \
             k3s kubectl patch serviceaccount default -n '${NAMESPACE}' --type=merge -p '{\"imagePullSecrets\":[{\"name\":\"ghcr-pull\"}]}'"

          ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" \
            "k3s kubectl apply -f '${REMOTE_DIR}/rendered-${ENV}.yaml'"

          # Manual deploys still use mutable env tags and need an explicit restart.
          if [[ "${RESTART_AFTER_APPLY}" == "true" ]]; then
            for deploy in ${TARGET_DEPLOYS}; do
              echo "Restarting ${deploy}..."
              ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" \
                "k3s kubectl rollout restart deployment/${deploy} -n '${NAMESPACE}'"
            done
          else
            echo "Skipping forced restarts because this deploy uses immutable image tags from the triggering build run."
          fi

          # Wait for rollouts using one SSH session per deployment to avoid long-lived broken pipes.
          for deploy in ${TARGET_DEPLOYS}; do
            echo "Waiting for ${deploy}..."
              rollout_timeout=$(ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" \
                "k3s kubectl get deployment/${deploy} -n '${NAMESPACE}' -o jsonpath='{.spec.progressDeadlineSeconds}'")
              rollout_timeout=${rollout_timeout:-600}
              if ! [[ "${rollout_timeout}" =~ ^[0-9]+$ ]]; then
                rollout_timeout=600
              fi
              echo "Using rollout timeout ${rollout_timeout}s for ${deploy}"
            if ! ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" \
                "k3s kubectl rollout status deployment/${deploy} -n '${NAMESPACE}' --timeout=${rollout_timeout}s"; then
              echo "Rollout failed for ${deploy}. Collecting diagnostics..."
              ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" \
                "set +e; \
                 echo '=== deployment describe ==='; \
                 k3s kubectl describe deployment/${deploy} -n '${NAMESPACE}'; \
                 echo '=== deployment image ==='; \
                 k3s kubectl get deployment/${deploy} -n '${NAMESPACE}' -o jsonpath='{.spec.template.spec.containers[*].image}'; \
                 echo; \
                 echo '=== replica sets ==='; \
                 k3s kubectl get rs -n '${NAMESPACE}' --sort-by=.metadata.creationTimestamp; \
                 echo '=== pods wide ==='; \
                 k3s kubectl get pods -n '${NAMESPACE}' -o wide; \
                   echo '=== target pods ==='; \
                   k3s kubectl get pods -n '${NAMESPACE}' -l app.kubernetes.io/name=${deploy} -o wide; \
                   for pod in \$(k3s kubectl get pods -n '${NAMESPACE}' -l app.kubernetes.io/name=${deploy} -o name); do \
                     echo \"=== describe \${pod} ===\"; \
                     k3s kubectl describe -n '${NAMESPACE}' \"\${pod}\"; \
                     echo \"=== logs current \${pod} ===\"; \
                     k3s kubectl logs -n '${NAMESPACE}' \"\${pod}\" --all-containers --tail=200; \
                     echo \"=== logs previous \${pod} ===\"; \
                     k3s kubectl logs -n '${NAMESPACE}' \"\${pod}\" --all-containers --previous --tail=200; \
                   done; \
                 echo '=== recent events ==='; \
                 k3s kubectl get events -n '${NAMESPACE}' --sort-by=.lastTimestamp | tail -n 50"
              exit 1
            fi
          done

          # Verify desired replicas are available after rollout.
          for deploy in ${TARGET_DEPLOYS}; do
            desired=$(ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" \
              "k3s kubectl get deployment/${deploy} -n '${NAMESPACE}' -o jsonpath='{.spec.replicas}'")
            available=$(ssh ${SSH_OPTS} "${K3S_USER}@${K3S_HOST}" \
              "k3s kubectl get deployment/${deploy} -n '${NAMESPACE}' -o jsonpath='{.status.availableReplicas}'")
            available=${available:-0}
            echo "Replica check ${deploy}: desired=${desired} available=${available}"
            if [ "${available}" -lt "${desired}" ]; then
              echo "Deployment ${deploy} does not have enough available replicas"
              exit 1
            fi
          done

      - name: Skip no-op workflow_run deploy
        if: steps.targets.outputs.mode == 'skip'
        run: |
          echo "No successful service image builds were detected in the triggering workflow run."
          echo "Skipping staging deployment refresh."

      - name: Smoke test
        if: steps.targets.outputs.mode == 'apply'
        run: |
          set -euo pipefail
          ENV="${{ steps.env.outputs.env }}"
          TARGET_DEPLOYS="${{ steps.targets.outputs.deployments }}"
          echo "Deployment to ${ENV} completed."

          if [[ "${ENV}" == "stg" ]]; then
            GATEWAY_BASE="https://axiomnode-gateway.amksandbox.cloud"

            gateway_health=$(curl -sS -o /tmp/gateway-health.json -w "%{http_code}" "${GATEWAY_BASE}/health")
            echo "gateway /health -> ${gateway_health}"

            [[ "${gateway_health}" == "200" ]] || { echo "Gateway health check failed"; cat /tmp/gateway-health.json; exit 1; }

            if [[ " ${TARGET_DEPLOYS} " == *" api-gateway "* ]]; then
              quiz_random=$(curl -sS -o /tmp/quiz-random.json -w "%{http_code}" "${GATEWAY_BASE}/v1/mobile/games/quiz/random?language=es")
              wordpass_random=$(curl -sS -o /tmp/wordpass-random.json -w "%{http_code}" "${GATEWAY_BASE}/v1/mobile/games/wordpass/random?language=es")
              backoffice_services=$(curl -sS -o /tmp/backoffice-services.json -w "%{http_code}" "${GATEWAY_BASE}/v1/backoffice/services")

              echo "mobile quiz random -> ${quiz_random}"
              echo "mobile wordpass random -> ${wordpass_random}"
              echo "backoffice services -> ${backoffice_services}"

              [[ "${backoffice_services}" == "401" ]] || { echo "Backoffice route is no longer protected"; cat /tmp/backoffice-services.json; exit 1; }
              [[ "${quiz_random}" != "401" && "${quiz_random}" != "403" ]] || { echo "Quiz random route is still protected"; cat /tmp/quiz-random.json; exit 1; }
              [[ "${wordpass_random}" != "401" && "${wordpass_random}" != "403" ]] || { echo "Wordpass random route is still protected"; cat /tmp/wordpass-random.json; exit 1; }
            fi
          fi
