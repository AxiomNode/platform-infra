apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: axiomnode-stg

resources:
  - ../stg
  - ../../base/ai-engine-llama

patches:
  - target:
      kind: Deployment
      name: ai-engine-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ai-engine-api
      spec:
        progressDeadlineSeconds: 1800
        replicas: 1
        strategy:
          type: Recreate
        template:
          spec:
            containers:
              - name: ai-engine-api
                env:
                  - name: UVICORN_WORKERS
                    value: "1"
                startupProbe:
                  httpGet:
                    path: /health
                    port: 8001
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 60
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 8001
                  initialDelaySeconds: 180
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
                readinessProbe:
                  httpGet:
                    path: /ready
                    port: 8001
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 6
  - target:
      kind: Deployment
      name: ai-engine-llama
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ai-engine-llama
      spec:
        template:
          spec:
            initContainers:
              - name: model-bootstrap
                image: busybox:1.36
                command:
                  - sh
                  - -ec
                  - |
                    set -e
                    MODEL_FILE="${LLAMA_MODEL_FILE:-Qwen2.5-7B-Instruct-Q4_K_M.gguf}"
                    MODEL_URL="${LLAMA_MODEL_URL:-}"

                    if [ -z "$MODEL_URL" ]; then
                      echo "LLAMA_MODEL_URL is empty"
                      exit 1
                    fi

                    if [ -f "/models/$MODEL_FILE" ]; then
                      echo "Model already present: /models/$MODEL_FILE"
                      exit 0
                    fi

                    echo "Downloading model from $MODEL_URL"
                    wget -O "/models/$MODEL_FILE.part" "$MODEL_URL"
                    mv "/models/$MODEL_FILE.part" "/models/$MODEL_FILE"
                    ls -lah /models
                env:
                  - name: LLAMA_MODEL_FILE
                    value: Qwen2.5-7B-Instruct-Q4_K_M.gguf
                  - name: LLAMA_MODEL_URL
                    value: https://huggingface.co/bartowski/Qwen2.5-7B-Instruct-GGUF/resolve/main/Qwen2.5-7B-Instruct-Q4_K_M.gguf
                envFrom:
                  - configMapRef:
                      name: ai-engine-llama-config
                      optional: true
                volumeMounts:
                  - name: models
                    mountPath: /models
            containers:
              - name: llama-server
                env:
                  - name: LLAMA_MODEL_FILE
                    value: Qwen2.5-7B-Instruct-Q4_K_M.gguf
  - target:
      kind: Deployment
      name: ai-engine-llama
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ai-engine-llama
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: llama-server
                resources:
                  requests:
                    cpu: "2000m"
                    memory: "6Gi"
                  limits:
                    cpu: "4000m"
                    memory: "10Gi"
                env:
                  - name: LLAMA_THREADS
                    value: "4"
                  - name: LLAMA_BATCH
                    value: "512"
                  - name: LLAMA_CTX_SIZE
                    value: "2048"
                  - name: LLAMA_PARALLEL
                    value: "1"

configMapGenerator:
  - name: ai-engine-api-config
    behavior: merge
    literals:
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
      - PRIVATE_DOCS_ENABLED=false
      - AI_ENGINE_DIAGNOSTICS_CACHE_TTL_MS=2000
  - name: ai-engine-stats-config
    behavior: merge
    literals:
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
  - name: ai-engine-llama-config
    literals:
      - LLAMA_MODEL_FILE=Qwen2.5-7B-Instruct-Q4_K_M.gguf

images:
  - name: ghcr.io/axiomnode/ai-engine-api
    newTag: stg
  - name: ghcr.io/axiomnode/ai-engine-stats
    newTag: stg