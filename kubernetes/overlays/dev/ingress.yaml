apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: axiomnode-ingress
  labels:
    app.kubernetes.io/part-of: axiomnode
spec:
  entryPoints:
    - web
    - websecure
  routes:
    # Public backoffice frontend (via Nginx Proxy Manager)
    - match: Host(`axiomnode-backoffice.amksandbox.cloud`)
      kind: Rule
      services:
        - name: backoffice
          port: 80

    # Public API gateway entry (used by backoffice/mobile edge clients)
    - match: Host(`axiomnode-gateway.amksandbox.cloud`)
      kind: Rule
      services:
        - name: api-gateway
          port: 7005
