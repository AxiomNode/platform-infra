apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: axiomnode-ingress
  labels:
    app.kubernetes.io/part-of: axiomnode
spec:
  entryPoints:
    - web
    - websecure
  routes:
    # API Gateway — main entry point
    - match: Host(`api.axiomnode.dev`)
      kind: Rule
      services:
        - name: api-gateway
          port: 7005

    # Backoffice frontend
    - match: Host(`backoffice.axiomnode.dev`)
      kind: Rule
      services:
        - name: backoffice
          port: 80

    # AI Engine API (direct access for dev/debug)
    - match: Host(`ai.axiomnode.dev`)
      kind: Rule
      services:
        - name: ai-engine-api
          port: 8001

    # AI Engine Stats
    - match: Host(`stats.axiomnode.dev`)
      kind: Rule
      services:
        - name: ai-engine-stats
          port: 8000
