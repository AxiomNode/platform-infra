apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: axiomnode-dev

resources:
  - ../../base
  - ingress.yaml
  - sealed-secrets

patches:
  - path: patches/ai-engine-resources.yaml
  - path: patches/microservices-resources.yaml
  - path: patches/llama-resources.yaml

configMapGenerator:
  - name: ai-engine-api-config
    literals:
      - DISTRIBUTION=dev
      - LOG_LEVEL=debug
      - WORKERS=1
  - name: ai-engine-stats-config
    literals:
      - DISTRIBUTION=dev
  - name: microservice-quizz-config
    literals:
      - PRIVATE_DOCS_ENABLED=false
      - DISTRIBUTION=dev
      - LOG_LEVEL=debug
  - name: microservice-wordpass-config
    literals:
      - SERVICE_PORT=7100
      - PRIVATE_DOCS_ENABLED=false
      - DISTRIBUTION=dev
      - LOG_LEVEL=debug
  - name: microservice-users-config
    literals:
      - SERVICE_NAME=microservice-users
      - SERVICE_PORT=7100
      - DISTRIBUTION=dev
      - LOG_LEVEL=debug
      - FIREBASE_STRICT_AUTH=false
      - PRIVATE_DOCS_ENABLED=false
  - name: api-gateway-config
    literals:
      - DISTRIBUTION=dev
      - LOG_LEVEL=debug
  - name: bff-mobile-config
    literals:
      - SERVICE_NAME=bff-mobile
      - SERVICE_PORT=7010
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - DISTRIBUTION=dev
      - LOG_LEVEL=debug
  - name: bff-backoffice-config
    literals:
      - SERVICE_NAME=bff-backoffice
      - SERVICE_PORT=7011
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - DISTRIBUTION=dev
      - LOG_LEVEL=debug

images:
  - name: ghcr.io/axiomnode/ai-engine-api
    newTag: dev
  - name: ghcr.io/axiomnode/ai-engine-stats
    newTag: dev
  - name: ghcr.io/axiomnode/microservice-quizz-api
    newTag: dev
  - name: ghcr.io/axiomnode/microservice-wordpass-api
    newTag: dev
  - name: ghcr.io/axiomnode/microservice-users-api
    newTag: dev
  - name: ghcr.io/axiomnode/api-gateway
    newTag: dev
  - name: ghcr.io/axiomnode/bff-mobile
    newTag: dev
  - name: ghcr.io/axiomnode/bff-backoffice
    newTag: dev
  - name: ghcr.io/axiomnode/backoffice
    newTag: dev
