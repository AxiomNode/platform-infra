apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine-api
spec:
  progressDeadlineSeconds: 900
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    spec:
      containers:
        - name: ai-engine-api
          env:
            - name: UVICORN_WORKERS
              value: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30