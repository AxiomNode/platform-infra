apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine-api
spec:
  progressDeadlineSeconds: 1800
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      containers:
        - name: ai-engine-api
          env:
            - name: UVICORN_WORKERS
              value: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6