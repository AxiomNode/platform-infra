apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: axiomnode-stg

resources:
  - ../../base
  - ingress.yaml
  - sealed-secrets

patches:
  - path: patches/replicas.yaml
  - path: patches/llama-resources.yaml
  - path: patches/llama-model-bootstrap.yaml

configMapGenerator:
  - name: ai-engine-api-config
    literals:
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
      - WORKERS=2
  - name: ai-engine-stats-config
    literals:
      - DISTRIBUTION=stg
  - name: ai-engine-llama-config
    literals:
      - LLAMA_MODEL_FILE=Qwen2.5-3B-Instruct-Q4_K_M.gguf
      - LLAMA_MODEL_URL=https://huggingface.co/Qwen/Qwen2.5-3B-Instruct-GGUF/resolve/main/qwen2.5-3b-instruct-q4_k_m.gguf
  - name: microservice-quizz-config
    literals:
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
      - PRIVATE_DOCS_ENABLED=false
  - name: microservice-wordpass-config
    literals:
      - SERVICE_PORT=7100
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
      - PRIVATE_DOCS_ENABLED=false
  - name: microservice-users-config
    literals:
      - SERVICE_NAME=microservice-users
      - SERVICE_PORT=7100
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
      - FIREBASE_STRICT_AUTH=true
      - PRIVATE_DOCS_ENABLED=false
  - name: api-gateway-config
    literals:
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=https://axiomnode-backoffice.amksandbox.cloud,http://localhost:5173,http://localhost:3000
  - name: bff-mobile-config
    literals:
      - SERVICE_NAME=bff-mobile
      - SERVICE_PORT=7010
      - ALLOWED_ORIGINS=https://axiomnode-backoffice.amksandbox.cloud,http://localhost:5173,http://localhost:3000
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
  - name: bff-backoffice-config
    literals:
      - SERVICE_NAME=bff-backoffice
      - SERVICE_PORT=7011
      - API_GATEWAY_URL=http://api-gateway:7005
      - BFF_MOBILE_URL=http://bff-mobile:7010
      - AI_ENGINE_API_URL=http://ai-engine-api:8001
      - ALLOWED_ORIGINS=https://axiomnode-backoffice.amksandbox.cloud,http://localhost:5173,http://localhost:3000
      - DISTRIBUTION=stg
      - LOG_LEVEL=info
  - name: backoffice-config
    literals:
      - VITE_API_BASE_URL=https://axiomnode-gateway.amksandbox.cloud
      - VITE_AUTH_MODE=firebase
      - VITE_FIREBASE_API_KEY=AIzaSyCwatBddeM-XP6mwesofOPfKouzlXCWkk8
      - VITE_FIREBASE_AUTH_DOMAIN=axiomnode.firebaseapp.com
      - VITE_FIREBASE_PROJECT_ID=axiomnode
      - VITE_FIREBASE_STORAGE_BUCKET=axiomnode.firebasestorage.app
      - VITE_FIREBASE_MESSAGING_SENDER_ID=909798677135
      - VITE_FIREBASE_APP_ID=1:909798677135:web:fca121dc628cbee27b6efa
      - VITE_FIREBASE_MEASUREMENT_ID=G-TGPDGDK2Q7

images:
  - name: ghcr.io/axiomnode/ai-engine-api
    newTag: stg
  - name: ghcr.io/axiomnode/ai-engine-stats
    newTag: stg
  - name: ghcr.io/axiomnode/microservice-quizz-api
    newTag: stg
  - name: ghcr.io/axiomnode/microservice-wordpass-api
    newTag: stg
  - name: ghcr.io/axiomnode/microservice-users-api
    newTag: stg
  - name: ghcr.io/axiomnode/api-gateway
    newTag: stg
  - name: ghcr.io/axiomnode/bff-mobile
    newTag: stg
  - name: ghcr.io/axiomnode/bff-backoffice
    newTag: stg
  - name: ghcr.io/axiomnode/backoffice
    newTag: stg
