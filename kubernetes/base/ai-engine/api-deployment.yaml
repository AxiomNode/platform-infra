apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine-api
  labels:
    app.kubernetes.io/name: ai-engine-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: axiomnode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-engine-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-engine-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: axiomnode
    spec:
      containers:
        - name: ai-engine-api
          image: ghcr.io/axiomnode/ai-engine-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              protocol: TCP
          env:
            - name: PORT
              value: "8001"
            - name: UVICORN_WORKERS
              value: "2"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: AI_ENGINE_LLAMA_URL
              value: "http://ai-engine-llama:8080/v1/completions"
            - name: AI_ENGINE_GENERATION_CACHE_REDIS_URL
              value: "redis://ai-engine-cache:6379/0"
          envFrom:
            - secretRef:
                name: ai-engine-api-secret
                optional: true
            - configMapRef:
                name: ai-engine-api-config
                optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1500m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
            - name: data
              mountPath: /app/data
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ai-engine-llama-models
        - name: data
          emptyDir: {}
