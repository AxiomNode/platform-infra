apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine-stats
  labels:
    app.kubernetes.io/name: ai-engine-stats
    app.kubernetes.io/component: stats
    app.kubernetes.io/part-of: axiomnode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-engine-stats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-engine-stats
        app.kubernetes.io/component: stats
        app.kubernetes.io/part-of: axiomnode
    spec:
      containers:
        - name: ai-engine-stats
          image: ghcr.io/axiomnode/ai-engine-stats:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: UVICORN_WORKERS
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: AI_ENGINE_GENERATION_API_URL
              value: "http://ai-engine-api:8001"
          envFrom:
            - secretRef:
                name: ai-engine-stats-secret
                optional: true
            - configMapRef:
                name: ai-engine-stats-config
                optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
