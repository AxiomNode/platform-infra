apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-backoffice
  labels:
    app.kubernetes.io/name: bff-backoffice
    app.kubernetes.io/component: bff
    app.kubernetes.io/part-of: axiomnode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bff-backoffice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bff-backoffice
        app.kubernetes.io/component: bff
        app.kubernetes.io/part-of: axiomnode
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bff-backoffice
          image: ghcr.io/axiomnode/bff-backoffice:stg
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 7011
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: BACKOFFICE_ROUTING_STATE_FILE
              value: "/var/lib/axiomnode/bff-backoffice/routing-state.json"
            - name: PORT
              value: "7011"
            - name: QUIZZ_SERVICE_URL
              value: "http://microservice-quizz-api:7100"
            - name: WORDPASS_SERVICE_URL
              value: "http://microservice-wordpass-api:7100"
            - name: USERS_SERVICE_URL
              value: "http://microservice-users-api:7100"
          envFrom:
            - configMapRef:
                name: bff-backoffice-config
                optional: true
            - secretRef:
                name: bff-backoffice-secret
                optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 7011
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7011
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: routing-state
              mountPath: /var/lib/axiomnode/bff-backoffice
      volumes:
        - name: routing-state
          persistentVolumeClaim:
            claimName: bff-backoffice-routing-state
