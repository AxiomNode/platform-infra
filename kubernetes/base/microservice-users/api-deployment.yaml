apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-users-api
  labels:
    app.kubernetes.io/name: microservice-users-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: axiomnode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: microservice-users-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: microservice-users-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: axiomnode
    spec:
      containers:
        - name: microservice-users
          image: ghcr.io/axiomnode/microservice-users-api:latest
          imagePullPolicy: Always
          command: ["sh", "-c"]
          args:
            - "npx prisma migrate deploy && node dist/app/server.js"
          ports:
            - containerPort: 7100
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: users-db-secret
                  key: database-url
          envFrom:
            - secretRef:
                name: microservice-users-secret
                optional: true
            - configMapRef:
                name: microservice-users-config
                optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: firebase-credentials
              mountPath: /app/credentials
              readOnly: true
      volumes:
        - name: firebase-credentials
          secret:
            secretName: firebase-credentials
            optional: true
