apiVersion: apps/v1
kind: Deployment
metadata:
  name: backoffice
  labels:
    app.kubernetes.io/name: backoffice
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: axiomnode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backoffice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backoffice
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: axiomnode
    spec:
      containers:
        - name: backoffice
          image: ghcr.io/axiomnode/backoffice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backoffice-config
                optional: true
            - secretRef:
                name: backoffice-secret
                optional: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
