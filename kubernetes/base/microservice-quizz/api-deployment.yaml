apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-quizz-api
  labels:
    app.kubernetes.io/name: microservice-quizz-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: axiomnode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: microservice-quizz-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: microservice-quizz-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: axiomnode
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: microservice-quizz
          image: ghcr.io/axiomnode/microservice-quizz-api:stg
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          command: ["sh", "-c"]
          args:
            - "npx prisma db push && node dist/app/server.js"
          ports:
            - containerPort: 7100
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: AI_ENGINE_BASE_URL
              value: "http://api-gateway:7005/internal/ai-engine"
            - name: BATCH_GENERATION_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quizz-db-secret
                  key: database-url
          envFrom:
            - secretRef:
                name: microservice-quizz-secret
                optional: true
            - configMapRef:
                name: microservice-quizz-config
                optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
