apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: axiomnode
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: axiomnode
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          image: ghcr.io/axiomnode/api-gateway:stg
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 7005
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: GATEWAY_ROUTING_STATE_FILE
              value: "/var/lib/axiomnode/api-gateway/routing-state.json"
            - name: PORT
              value: "7005"
            - name: BFF_MOBILE_URL
              value: "http://bff-mobile:7010"
            - name: BFF_BACKOFFICE_URL
              value: "http://bff-backoffice:7011"
            - name: AI_ENGINE_API_URL
              value: "http://localhost:7001"
            - name: AI_ENGINE_STATS_URL
              value: "http://localhost:7000"
          envFrom:
            - configMapRef:
                name: api-gateway-config
                optional: true
            - secretRef:
                name: api-gateway-secret
                optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 7005
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7005
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: routing-state
              mountPath: /var/lib/axiomnode/api-gateway
      volumes:
        - name: routing-state
          persistentVolumeClaim:
            claimName: api-gateway-routing-state
