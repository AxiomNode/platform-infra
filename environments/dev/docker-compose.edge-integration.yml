services:
  backoffice:
    image: "backoffice_edge_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    container_name: "backoffice_edge_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    restart: unless-stopped
    build:
      context: ../../../
      dockerfile: backoffice/Dockerfile
    env_file:
      - ../../../backoffice/.env.secrets
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "7080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.25"

  api-gateway:
    image: "api_gateway_edge_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    container_name: "api_gateway_edge_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    restart: unless-stopped
    build:
      context: ../../../
      dockerfile: api-gateway/src/Dockerfile.edge
    env_file:
      - ../../../api-gateway/src/.env
      - ../../../api-gateway/src/.env.secrets
    environment:
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:7080
      BFF_MOBILE_URL: http://bff-mobile:7010
      BFF_BACKOFFICE_URL: http://bff-backoffice:7011
      UPSTREAM_GENERATION_TIMEOUT_MS: 300000
    depends_on:
      bff-mobile:
        condition: service_healthy
      bff-backoffice:
        condition: service_healthy
    ports:
      - "7005:7005"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7005/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.5"

  bff-mobile:
    image: "bff_mobile_edge_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    container_name: "bff_mobile_edge_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    restart: unless-stopped
    build:
      context: ../../../
      dockerfile: bff-mobile/src/Dockerfile.edge
    env_file:
      - ../../../bff-mobile/src/.env
    environment:
      QUIZZ_SERVICE_URL: http://host.docker.internal:7100
      WORDPASS_SERVICE_URL: http://host.docker.internal:7101
      USERS_SERVICE_URL: http://host.docker.internal:7102
      UPSTREAM_GENERATION_TIMEOUT_MS: 300000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7010:7010"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7010/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.5"

  bff-backoffice:
    image: "bff_backoffice_edge_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    container_name: "bff_backoffice_edge_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    restart: unless-stopped
    build:
      context: ../../../
      dockerfile: bff-backoffice/src/Dockerfile.edge
    env_file:
      - ../../../bff-backoffice/src/.env
      - ../../../bff-backoffice/src/.env.secrets
    environment:
      USERS_SERVICE_URL: http://host.docker.internal:7102
      QUIZZ_SERVICE_URL: http://host.docker.internal:7100
      WORDPASS_SERVICE_URL: http://host.docker.internal:7101
      BFF_MOBILE_URL: http://bff-mobile:7010
      API_GATEWAY_URL: http://api-gateway:7005
      AI_ENGINE_STATS_URL: http://host.docker.internal:7000
      AI_ENGINE_API_URL: http://host.docker.internal:7001
      METRICS_LOG_BUFFER_SIZE: 1000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7011:7011"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7011/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.5"
